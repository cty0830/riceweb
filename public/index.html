<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>米流控制</title>
    <link rel="stylesheet" href="/stylesheets/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>

  <body>
    <div class="page">
      <header class="hero">
        <div>
          <p class="eyebrow">Rice Flow Control</p>
          <h1>米流控制</h1>
          <p class="subtitle">管理蓬萊米歷史價格，快速錄入，精準查詢。</p>
        </div>
        <div class="hero-actions">
          <a class="ghost-link" href="/charts.html">前往趨勢圖表</a>
          <div class="hero-badge">
            <span>Price Intel</span>
            <strong>10Y</strong>
          </div>
        </div>
      </header>

      <main class="grid">
        <section class="card">
          <h2>新增價格紀錄</h2>
          <p class="muted">輸入日期、商品名稱與價格。</p>
          <form class="form" id="price-form">
            <label>
              日期
              <input type="date" name="saleDate" required>
            </label>
            <label>
              商品名稱
              <input type="text" name="productName" placeholder="蓬萊米" required>
            </label>
            <label>
              商品價格
              <input type="number" name="price" min="0" step="0.1" placeholder="0.0" required>
            </label>
            <button class="primary" type="submit">送出紀錄</button>
          </form>
        </section>

        <section class="card">
          <h2>資料庫紀錄</h2>
          <p class="muted">最新的價格紀錄會顯示在下方。</p>
          <form class="form" id="search-form">
            <label>
              起始日期
              <input type="date" name="startDate">
            </label>
            <label>
              結束日期
              <input type="date" name="endDate">
            </label>
            <button class="ghost" type="submit">搜尋</button>
          </form>
          <div class="table-shell" id="price-table-shell">
            <p class="table-status" id="price-table-status">載入中...</p>
          </div>
        </section>
      </main>
    </div>
    <script src="/javascripts/index.js"></script>
  </body>
</html>
